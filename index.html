<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>바다 볼 수 있는 숙소 찾기</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* 전체 레이아웃 */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 검색 영역 */
    .sidebar {
      width: 35%;
      min-width: 320px;
      border-right: 1px solid #ddd;
      background-color: white;
      display: flex;
      flex-direction: column;
    }

    /* 검색창 */
    .search-box {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }

    .search-box h1 {
      margin-bottom: 15px;
      font-size: 24px;
    }

    .search-form {
      display: flex;
      gap: 10px;
    }

    .search-form input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .search-form button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background-color: #00bcd4;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .search-form button:hover {
      background-color: #0097a7;
    }

    /* 검색 결과 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .place-item {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .place-item:hover {
      background-color: #f7f7f7;
    }

    .place-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .place-address {
      font-size: 14px;
      color: #666;
      margin-bottom: 6px;
    }

    .place-phone {
      font-size: 13px;
      color: #999;
    }

    /* 지도 영역 */
    #map {
      flex: 1;
      width: 65%;
      height: 100vh;
    }

    /* 모바일 대응 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 45%;
      }

      #map {
        width: 100%;
        height: 55%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 왼쪽 영역 -->
    <div class="sidebar">

      <!-- 검색창 -->
      <div class="search-box">

        <h1>🌊 바다 숙소 찾기</h1>

        <form id="searchForm" class="search-form">

          <input
            type="text"
            id="keyword"
            placeholder="예: 강릉, 부산, 제주"
          />

          <button type="submit">검색</button>

        </form>

      </div>

      <!-- 검색 결과 -->
      <div id="resultList" class="result-list"></div>

    </div>

    <!-- 지도 -->
    <div id="map"></div>

  </div>

  <!-- 카카오맵 SDK -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a86be88376cf10f86584887bf9cacbe1&libraries=services"></script>

  <script>

    // 지도 객체
    let map;

    // 장소 검색 객체
    let placesService;

    // 마커 저장 배열
    let markers = [];

    // 기본 위치
    const defaultLatitude = 37.5665;
    const defaultLongitude = 126.9780;

    // 지도 생성
    function createMap(latitude, longitude) {

      // 중심 좌표
      const centerPosition = new kakao.maps.LatLng(
        latitude,
        longitude
      );

      // 지도 옵션
      const mapOption = {
        center: centerPosition,
        level: 5
      };

      // 지도 생성
      map = new kakao.maps.Map(
        document.getElementById("map"),
        mapOption
      );

      // 현재 위치 마커
      const currentMarker = new kakao.maps.Marker({
        position: centerPosition
      });

      currentMarker.setMap(map);

      // 현재 위치 인포윈도우
      const currentInfoWindow = new kakao.maps.InfoWindow({
        content: `
          <div style="padding:8px;font-size:13px;">
            현재 위치
          </div>
        `
      });

      currentInfoWindow.open(map, currentMarker);

      // 장소 검색 서비스 생성
      placesService = new kakao.maps.services.Places();

      // 검색 이벤트 연결
      connectSearchEvent();
    }

    // 현재 위치 가져오기
    function loadCurrentLocation() {

      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

          // 성공 시
          function(position) {

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            createMap(latitude, longitude);
          },

          // 실패 시
          function() {

            createMap(
              defaultLatitude,
              defaultLongitude
            );

            alert("위치 권한이 거부되어 기본 위치로 표시됩니다.");
          }

        );

      } else {

        createMap(
          defaultLatitude,
          defaultLongitude
        );

        alert("위치 정보를 지원하지 않는 브라우저입니다.");
      }
    }

    // 검색 이벤트 연결
    function connectSearchEvent() {

      const searchForm = document.getElementById("searchForm");

      searchForm.addEventListener("submit", function(event) {

        // 새로고침 방지
        event.preventDefault();

        // 검색어 가져오기
        const keyword = document
          .getElementById("keyword")
          .value
          .trim();

        if (!keyword) {

          alert("지역을 입력하세요.");
          return;
        }

        // 바다 숙소 키워드 추가
        const searchKeyword =
          keyword + " 오션뷰 호텔 펜션 리조트";

        // 장소 검색
        searchPlaces(searchKeyword);
      });
    }

    // 장소 검색
    function searchPlaces(keyword) {

      placesService.keywordSearch(

        keyword,

        function(data, status) {

          if (
            status ===
            kakao.maps.services.Status.OK
          ) {

            displayPlaces(data);

          } else {

            alert("검색 결과가 없습니다.");
          }
        }

      );
    }

    // 검색 결과 표시
    function displayPlaces(places) {

      const resultList =
        document.getElementById("resultList");

      // 기존 결과 제거
      resultList.innerHTML = "";

      // 기존 마커 제거
      removeMarkers();

      // 지도 범위 설정용
      const bounds =
        new kakao.maps.LatLngBounds();

      places.forEach(function(place) {

        // 좌표 생성
        const position =
          new kakao.maps.LatLng(
            place.y,
            place.x
          );

        // 마커 이미지
        const markerImageUrl =
          "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png";

        const markerImageSize =
          new kakao.maps.Size(24, 35);

        const markerImage =
          new kakao.maps.MarkerImage(
            markerImageUrl,
            markerImageSize
          );

        // 마커 생성
        const marker =
          new kakao.maps.Marker({

            map: map,
            position: position,
            image: markerImage
          });

        // 마커 저장
        markers.push(marker);

        // 지도 범위 추가
        bounds.extend(position);

        // 검색 결과 아이템 생성
        const item =
          document.createElement("div");

        item.className = "place-item";

        item.innerHTML = `
          <div class="place-name">
            ${place.place_name}
          </div>

          <div class="place-address">
            ${place.road_address_name || place.address_name}
          </div>

          <div class="place-phone">
            ${place.phone || "전화번호 없음"}
          </div>
        `;

        // 클릭 시 지도 이동
        item.addEventListener(
          "click",
          function() {

            map.setCenter(position);

            const infoWindow =
              new kakao.maps.InfoWindow({

                content: `
                  <div style="
                    padding:10px;
                    font-size:13px;
                  ">
                    🌊 ${place.place_name}
                  </div>
                `
              });

            infoWindow.open(map, marker);
          }
        );

        // 결과 리스트 추가
        resultList.appendChild(item);

      });

      // 지도 범위 적용
      map.setBounds(bounds);
    }

    // 마커 제거
    function removeMarkers() {

      markers.forEach(function(marker) {

        marker.setMap(null);

      });

      markers = [];
    }

    // 페이지 로드 후 실행
    window.onload = function() {

      // 카카오맵 완전 로드 후 실행
      kakao.maps.load(function() {

        loadCurrentLocation();

      });
    };

  </script>

</body>
</html>
