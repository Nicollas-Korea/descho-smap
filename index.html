<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>꽃집 추천 지도 서비스</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
    }

    .container{
      display:flex;
      width:100%;
      height:100vh;
    }

    /* 왼쪽 영역 */
    .sidebar{
      width:35%;
      min-width:340px;
      border-right:1px solid #ddd;
      background:white;
      display:flex;
      flex-direction:column;
    }

    .top-area{
      padding:20px;
      border-bottom:1px solid #eee;
    }

    .title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:15px;
    }

    /* 탭 */
    .tab-container{
      display:flex;
      gap:10px;
      margin-bottom:15px;
    }

    .tab-button{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      background:#f2f2f2;
      transition:0.2s;
    }

    .tab-button.active{
      background:#ffb6c1;
      color:#000;
    }

    /* 검색 */
    .search-row{
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }

    .search-row input{
      flex:1;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:15px;
    }

    .search-row button{
      padding:12px 16px;
      border:none;
      border-radius:8px;
      background:#ffcd00;
      font-weight:bold;
      cursor:pointer;
    }

    .search-row button:hover{
      background:#f4c200;
    }

    /* 결과 */
    .result-list{
      flex:1;
      overflow-y:auto;
      padding:15px;
    }

    .result-item{
      padding:15px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      transition:0.2s;
    }

    .result-item:hover{
      background:#fafafa;
    }

    .flower-type{
      display:inline-block;
      padding:4px 8px;
      border-radius:6px;
      font-size:12px;
      margin-bottom:8px;
      background:#ffe3ea;
    }

    .place-name{
      font-size:17px;
      font-weight:bold;
      margin-bottom:6px;
    }

    .place-info{
      font-size:14px;
      color:#555;
      margin-bottom:5px;
    }

    .place-time{
      font-size:14px;
      color:#0066cc;
      font-weight:bold;
    }

    /* 지도 */
    .map-area{
      flex:1;
      position:relative;
    }

    #map{
      width:100%;
      height:100%;
    }

    .loading{
      position:absolute;
      top:15px;
      left:15px;
      z-index:100;
      background:rgba(255,255,255,0.95);
      padding:10px 15px;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:14px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 왼쪽 -->
  <div class="sidebar">

    <div class="top-area">

      <div class="title">
        꽃집 추천 서비스
      </div>

      <!-- 탭 -->
      <div class="tab-container">

        <button
          class="tab-button active"
          id="roseTab"
          onclick="changeFlower('장미')"
        >
          🌹 장미
        </button>

        <button
          class="tab-button"
          id="lilyTab"
          onclick="changeFlower('백합')"
        >
          🤍 백합
        </button>

      </div>

      <!-- 검색 -->
      <div class="search-row">

        <input
          type="text"
          id="keyword"
          placeholder="꽃집 검색"
        >

        <button onclick="searchFlowerShop()">
          검색
        </button>

      </div>

      <!-- 현재 위치 -->
      <div class="search-row">

        <button onclick="moveToCurrentLocation()">
          현재 위치로 이동
        </button>

      </div>

    </div>

    <!-- 결과 -->
    <div class="result-list" id="resultList"></div>

  </div>

  <!-- 오른쪽 지도 -->
  <div class="map-area">

    <div class="loading" id="loadingText">
      꽃집 지도를 불러오는 중...
    </div>

    <div id="map"></div>

  </div>

</div>

<!-- 카카오맵 -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a86be88376cf10f86584887bf9cacbe1&libraries=services&autoload=false"></script>

<script>

  let map;
  let placesService;

  // 현재 위치
  let currentLatitude = 37.5665;
  let currentLongitude = 126.9780;

  // 현재 선택 꽃 종류
  let selectedFlower = "장미";

  // 마커 배열
  let blueMarkers = [];

  // 현재 위치 마커
  let currentMarker;

  // 지도 초기화
  function initMap(latitude, longitude){

    const container = document.getElementById("map");

    const options = {
      center:new kakao.maps.LatLng(latitude, longitude),
      level:5
    };

    map = new kakao.maps.Map(container, options);

    placesService = new kakao.maps.services.Places();

    // 현재 위치 표시
    showCurrentLocation(latitude, longitude);

    document.getElementById("loadingText").style.display = "none";
  }

  // 현재 위치 표시
  function showCurrentLocation(latitude, longitude){

    currentLatitude = latitude;
    currentLongitude = longitude;

    const position = new kakao.maps.LatLng(latitude, longitude);

    // 기존 마커 제거
    if(currentMarker){
      currentMarker.setMap(null);
    }

    currentMarker = new kakao.maps.Marker({
      map:map,
      position:position
    });

    const infoWindow = new kakao.maps.InfoWindow({
      content:`
        <div style="padding:8px;font-size:13px;">
          현재 위치
        </div>
      `
    });

    infoWindow.open(map, currentMarker);

    map.setCenter(position);
  }

  // 현재 위치 이동
  function moveToCurrentLocation(){

    if(navigator.geolocation){

      navigator.geolocation.getCurrentPosition(

        (position)=>{

          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          showCurrentLocation(latitude, longitude);

        },

        ()=>{

          alert("위치 권한이 거부되었습니다.");

        }

      );

    }else{

      alert("위치 서비스를 지원하지 않습니다.");

    }

  }

  // 꽃 탭 변경
  function changeFlower(flower){

    selectedFlower = flower;

    // 버튼 스타일 변경
    document.getElementById("roseTab").classList.remove("active");
    document.getElementById("lilyTab").classList.remove("active");

    if(flower === "장미"){
      document.getElementById("roseTab").classList.add("active");
    }else{
      document.getElementById("lilyTab").classList.add("active");
    }

  }

  // 꽃집 검색
  function searchFlowerShop(){

    const keywordInput = document
      .getElementById("keyword")
      .value
      .trim();

    // 검색어 자동 조합
    const searchKeyword =
      `${selectedFlower} 꽃집 ${keywordInput}`;

    // 기존 파란색 마커 제거
    removeBlueMarkers();

    const center = map.getCenter();

    placesService.keywordSearch(

      searchKeyword,

      placesSearchCallback,

      {
        location:center
      }

    );

  }

  // 검색 결과 처리
  function placesSearchCallback(data, status){

    if(status !== kakao.maps.services.Status.OK){

      alert("검색 결과가 없습니다.");
      return;
    }

    const resultList = document.getElementById("resultList");

    resultList.innerHTML = "";

    const bounds = new kakao.maps.LatLngBounds();

    data.forEach((place)=>{

      const position = new kakao.maps.LatLng(place.y, place.x);

      bounds.extend(position);

      // 파란색 마커
      const markerImage = new kakao.maps.MarkerImage(
        "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png",
        new kakao.maps.Size(24,35)
      );

      const marker = new kakao.maps.Marker({
        map:map,
        position:position,
        image:markerImage
      });

      blueMarkers.push(marker);

      // 거리 계산
      const distance = getDistance(
        currentLatitude,
        currentLongitude,
        place.y,
        place.x
      );

      // 대략 이동 시간
      const estimatedMinutes =
        Math.max(1, Math.round(distance / 70));

      // 결과 아이템
      const item = document.createElement("div");

      item.className = "result-item";

      item.innerHTML = `

        <div class="flower-type">
          ${selectedFlower} 추천 꽃집
        </div>

        <div class="place-name">
          ${place.place_name}
        </div>

        <div class="place-info">
          주소:
          ${place.road_address_name || place.address_name}
        </div>

        <div class="place-info">
          좌표:
          ${Number(place.y).toFixed(5)},
          ${Number(place.x).toFixed(5)}
        </div>

        <div class="place-time">
          예상 이동 시간:
          약 ${estimatedMinutes}분
        </div>

      `;

      // 클릭 시 지도 이동
      item.addEventListener("click", ()=>{

        map.setCenter(position);

        const infoWindow = new kakao.maps.InfoWindow({
          content:`
            <div style="padding:8px;font-size:13px;">
              ${place.place_name}
            </div>
          `
        });

        infoWindow.open(map, marker);

      });

      resultList.appendChild(item);

    });

    map.setBounds(bounds);

  }

  // 기존 마커 제거
  function removeBlueMarkers(){

    blueMarkers.forEach((marker)=>{
      marker.setMap(null);
    });

    blueMarkers = [];

  }

  // 거리 계산
  function getDistance(lat1, lng1, lat2, lng2){

    const earthRadius = 6371000;

    const dLat =
      (lat2 - lat1) * Math.PI / 180;

    const dLng =
      (lng2 - lng1) * Math.PI / 180;

    const a =

      Math.sin(dLat/2) *
      Math.sin(dLat/2)

      +

      Math.cos(lat1 * Math.PI/180) *
      Math.cos(lat2 * Math.PI/180) *

      Math.sin(dLng/2) *
      Math.sin(dLng/2);

    const c =
      2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
      );

    return earthRadius * c;

  }

  // 카카오맵 로드 완료 후 실행
  kakao.maps.load(()=>{

    if(navigator.geolocation){

      navigator.geolocation.getCurrentPosition(

        (position)=>{

          currentLatitude =
            position.coords.latitude;

          currentLongitude =
            position.coords.longitude;

          initMap(
            currentLatitude,
            currentLongitude
          );

        },

        ()=>{

          alert(
            "위치 권한이 거부되어 기본 위치로 이동합니다."
          );

          initMap(
            currentLatitude,
            currentLongitude
          );

        }

      );

    }else{

      initMap(
        currentLatitude,
        currentLongitude
      );

    }

  });

</script>

</body>
</html>
