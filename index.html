<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>카카오맵 장소 검색</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* 전체 화면 */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 영역 */
    .sidebar {
      width: 35%;
      min-width: 320px;
      border-right: 1px solid #ddd;
      background-color: white;
      display: flex;
      flex-direction: column;
    }

    /* 검색 영역 */
    .search-box {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }

    .search-box h1 {
      margin-bottom: 15px;
      font-size: 24px;
    }

    .search-form {
      display: flex;
      gap: 10px;
    }

    .search-form input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .search-form button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background-color: #fee500;
      cursor: pointer;
      font-weight: bold;
    }

    /* 검색 결과 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .place-item {
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .place-item:hover {
      background-color: #f7f7f7;
    }

    .place-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .place-address {
      font-size: 14px;
      color: #666;
      margin-bottom: 5px;
    }

    .place-phone {
      font-size: 13px;
      color: #999;
    }

    /* 지도 */
    #map {
      flex: 1;
      width: 65%;
      height: 100vh;
    }

    /* 모바일 */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 45%;
      }

      #map {
        width: 100%;
        height: 55%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 왼쪽 -->
    <div class="sidebar">

      <div class="search-box">
        <h1>장소 검색</h1>

        <form id="searchForm" class="search-form">
          <input
            type="text"
            id="keyword"
            placeholder="검색어 입력"
          />
          <button type="submit">검색</button>
        </form>
      </div>

      <div class="result-list" id="resultList"></div>

    </div>

    <!-- 오른쪽 지도 -->
    <div id="map"></div>

  </div>

  <!-- 카카오맵 SDK -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a86be88376cf10f86584887bf9cacbe1&libraries=services"></script>

  <script>
    // 지도 객체
    let map;

    // 장소 검색 객체
    let places;

    // 마커 배열
    let markers = [];

    // 지도 생성 함수
    function createMap(latitude, longitude) {

      // 지도 중심 좌표
      const centerPosition = new kakao.maps.LatLng(latitude, longitude);

      // 지도 옵션
      const mapOption = {
        center: centerPosition,
        level: 5
      };

      // 지도 생성
      map = new kakao.maps.Map(
        document.getElementById("map"),
        mapOption
      );

      // 현재 위치 마커
      const currentMarker = new kakao.maps.Marker({
        position: centerPosition
      });

      currentMarker.setMap(map);

      // 현재 위치 인포윈도우
      const infoWindow = new kakao.maps.InfoWindow({
        content: `
          <div style="padding:8px;font-size:13px;">
            현재 위치
          </div>
        `
      });

      infoWindow.open(map, currentMarker);

      // 장소 검색 서비스
      places = new kakao.maps.services.Places();

      // 검색 이벤트 연결
      connectSearchEvent();
    }

    // 현재 위치 가져오기
    function loadCurrentLocation() {

      // 위치 권한 허용 여부
      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

          // 성공
          function(position) {

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            createMap(latitude, longitude);
          },

          // 실패
          function() {

            // 기본 위치 (서울 시청)
            createMap(37.5665, 126.9780);

            alert("위치 권한이 거부되어 기본 위치로 표시됩니다.");
          }

        );

      } else {

        // 브라우저 미지원
        createMap(37.5665, 126.9780);

        alert("이 브라우저는 위치 정보를 지원하지 않습니다.");
      }
    }

    // 검색 이벤트 연결
    function connectSearchEvent() {

      const searchForm = document.getElementById("searchForm");

      searchForm.addEventListener("submit", function(event) {

        // 새로고침 방지
        event.preventDefault();

        const keyword = document
          .getElementById("keyword")
          .value
          .trim();

        if (!keyword) {
          alert("검색어를 입력하세요.");
          return;
        }

        searchPlace(keyword);
      });
    }

    // 장소 검색
    function searchPlace(keyword) {

      places.keywordSearch(keyword, function(data, status) {

        if (status === kakao.maps.services.Status.OK) {

          displayPlaces(data);

        } else {

          alert("검색 결과가 없습니다.");
        }
      });
    }

    // 검색 결과 표시
    function displayPlaces(data) {

      const resultList = document.getElementById("resultList");

      // 기존 결과 제거
      resultList.innerHTML = "";

      // 기존 마커 제거
      removeMarkers();

      // 지도 범위
      const bounds = new kakao.maps.LatLngBounds();

      data.forEach(function(place) {

        const position = new kakao.maps.LatLng(place.y, place.x);

        // 마커 생성
        const marker = new kakao.maps.Marker({
          map: map,
          position: position
        });

        markers.push(marker);

        bounds.extend(position);

        // 결과 요소 생성
        const item = document.createElement("div");

        item.className = "place-item";

        item.innerHTML = `
          <div class="place-name">${place.place_name}</div>

          <div class="place-address">
            ${place.road_address_name || place.address_name}
          </div>

          <div class="place-phone">
            ${place.phone || "전화번호 없음"}
          </div>
        `;

        // 클릭 시 지도 이동
        item.addEventListener("click", function() {

          map.setCenter(position);

          const infoWindow = new kakao.maps.InfoWindow({
            content: `
              <div style="padding:8px;font-size:13px;">
                ${place.place_name}
              </div>
            `
          });

          infoWindow.open(map, marker);
        });

        resultList.appendChild(item);
      });

      // 지도 범위 재설정
      map.setBounds(bounds);
    }

    // 마커 제거
    function removeMarkers() {

      markers.forEach(function(marker) {
        marker.setMap(null);
      });

      markers = [];
    }

    // 페이지 로드 후 실행
    window.onload = function() {

      // 카카오맵 로드 후 실행
      kakao.maps.load(function() {

        loadCurrentLocation();

      });
    };
  </script>

</body>
</html>
