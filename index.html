<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>꽃집 추천 지도 서비스</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#fafafa;
    }

    .container{
      display:flex;
      width:100%;
      height:100vh;
    }

    /* 왼쪽 패널 */
    .sidebar{
      width:35%;
      min-width:360px;
      background:white;
      border-right:1px solid #ddd;
      display:flex;
      flex-direction:column;
    }

    .top-area{
      padding:20px;
      border-bottom:1px solid #eee;
    }

    .title{
      font-size:25px;
      font-weight:bold;
      margin-bottom:18px;
      color:#333;
    }

    /* 검색 */
    .search-row{
      display:flex;
      gap:10px;
      margin-bottom:15px;
    }

    .search-row input{
      flex:1;
      padding:13px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:15px;
    }

    .search-row button{
      padding:13px 18px;
      border:none;
      border-radius:10px;
      background:#ffcd00;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .search-row button:hover{
      background:#f2c200;
    }

    /* 꽃 탭 */
    .flower-tabs{
      display:flex;
      gap:10px;
      margin-bottom:12px;
    }

    .flower-tab{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#f1f1f1;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    .flower-tab:hover{
      background:#e5e5e5;
    }

    .flower-tab.active{
      background:#ffb6c1;
      color:#000;
    }

    /* 현재 위치 버튼 */
    .location-button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#4da6ff;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .location-button:hover{
      background:#3399ff;
    }

    /* 결과 리스트 */
    .result-list{
      flex:1;
      overflow-y:auto;
      padding:15px;
    }

    .result-item{
      padding:15px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      transition:0.2s;
    }

    .result-item:hover{
      background:#fafafa;
    }

    .flower-type{
      display:inline-block;
      padding:4px 8px;
      border-radius:6px;
      font-size:12px;
      background:#ffe3ea;
      margin-bottom:8px;
    }

    .place-name{
      font-size:17px;
      font-weight:bold;
      margin-bottom:8px;
      color:#222;
    }

    .place-info{
      font-size:14px;
      color:#555;
      margin-bottom:5px;
    }

    .place-time{
      font-size:14px;
      font-weight:bold;
      color:#0066cc;
      margin-top:6px;
    }

    /* 지도 */
    .map-area{
      flex:1;
      position:relative;
    }

    #map{
      width:100%;
      height:100%;
    }

    /* 로딩 */
    .loading{
      position:absolute;
      top:15px;
      left:15px;
      z-index:100;
      background:rgba(255,255,255,0.95);
      padding:10px 14px;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:14px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 왼쪽 -->
  <div class="sidebar">

    <div class="top-area">

      <div class="title">
        🌸 꽃집 추천 지도
      </div>

      <!-- 검색 -->
      <div class="search-row">

        <input
          type="text"
          id="keyword"
          placeholder="예: 감성 꽃집, 큰 꽃집"
        >

        <button onclick="searchFlowerShop()">
          검색
        </button>

      </div>

      <!-- 꽃 탭 -->
      <div class="flower-tabs">

        <button
          class="flower-tab active"
          id="allTab"
          onclick="changeFlowerType('전체')"
        >
          🌼 전체
        </button>

        <button
          class="flower-tab"
          id="roseTab"
          onclick="changeFlowerType('장미')"
        >
          🌹 장미
        </button>

        <button
          class="flower-tab"
          id="lilyTab"
          onclick="changeFlowerType('백합')"
        >
          🤍 백합
        </button>

      </div>

      <!-- 현재 위치 -->
      <button
        class="location-button"
        onclick="moveToCurrentLocation()"
      >
        현재 위치로 이동
      </button>

    </div>

    <!-- 검색 결과 -->
    <div
      class="result-list"
      id="resultList"
    ></div>

  </div>

  <!-- 오른쪽 지도 -->
  <div class="map-area">

    <div
      class="loading"
      id="loadingText"
    >
      지도를 불러오는 중...
    </div>

    <div id="map"></div>

  </div>

</div>

<!-- 카카오맵 API -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a86be88376cf10f86584887bf9cacbe1&libraries=services&autoload=false"></script>

<script>

  let map;
  let placesService;

  // 현재 위치
  let currentLatitude = 37.5665;
  let currentLongitude = 126.9780;

  // 현재 선택 꽃 종류
  let selectedFlowerType = "전체";

  // 검색 마커 배열
  let blueMarkers = [];

  // 현재 위치 마커
  let currentMarker;

  // 지도 초기화
  function initMap(latitude, longitude){

    const mapContainer =
      document.getElementById("map");

    const mapOption = {

      center:new kakao.maps.LatLng(
        latitude,
        longitude
      ),

      level:5

    };

    map = new kakao.maps.Map(
      mapContainer,
      mapOption
    );

    placesService =
      new kakao.maps.services.Places();

    // 현재 위치 표시
    showCurrentLocation(
      latitude,
      longitude
    );

    document.getElementById(
      "loadingText"
    ).style.display = "none";

  }

  // 현재 위치 표시
  function showCurrentLocation(
    latitude,
    longitude
  ){

    currentLatitude = latitude;
    currentLongitude = longitude;

    const position =
      new kakao.maps.LatLng(
        latitude,
        longitude
      );

    // 기존 현재 위치 마커 제거
    if(currentMarker){
      currentMarker.setMap(null);
    }

    currentMarker =
      new kakao.maps.Marker({

        map:map,
        position:position

      });

    const infoWindow =
      new kakao.maps.InfoWindow({

        content:`
          <div style="
            padding:8px;
            font-size:13px;
          ">
            현재 위치
          </div>
        `

      });

    infoWindow.open(
      map,
      currentMarker
    );

    map.setCenter(position);

  }

  // 현재 위치 이동
  function moveToCurrentLocation(){

    if(navigator.geolocation){

      navigator.geolocation.getCurrentPosition(

        (position)=>{

          const latitude =
            position.coords.latitude;

          const longitude =
            position.coords.longitude;

          showCurrentLocation(
            latitude,
            longitude
          );

        },

        ()=>{

          alert(
            "위치 권한이 거부되었습니다."
          );

        }

      );

    }else{

      alert(
        "위치 서비스를 지원하지 않습니다."
      );

    }

  }

  // 꽃 종류 변경
  function changeFlowerType(type){

    selectedFlowerType = type;

    // active 제거
    document.getElementById(
      "allTab"
    ).classList.remove("active");

    document.getElementById(
      "roseTab"
    ).classList.remove("active");

    document.getElementById(
      "lilyTab"
    ).classList.remove("active");

    // active 추가
    if(type === "전체"){

      document.getElementById(
        "allTab"
      ).classList.add("active");

    }

    else if(type === "장미"){

      document.getElementById(
        "roseTab"
      ).classList.add("active");

    }

    else{

      document.getElementById(
        "lilyTab"
      ).classList.add("active");

    }

    // 탭 클릭 시 자동 검색
    searchFlowerShop();

  }

  // 꽃집 검색
  function searchFlowerShop(){

    const keywordInput =
      document.getElementById(
        "keyword"
      ).value.trim();

    let searchKeyword = "";

    // 검색 키워드 설정
    if(selectedFlowerType === "전체"){

      searchKeyword =
        `꽃집 ${keywordInput}`;

    }

    else if(selectedFlowerType === "장미"){

      searchKeyword =
        `장미 꽃집 ${keywordInput}`;

    }

    else{

      searchKeyword =
        `백합 꽃집 ${keywordInput}`;

    }

    // 기존 마커 제거
    removeBlueMarkers();

    // 현재 지도 중심 기준 검색
    const center = map.getCenter();

    placesService.keywordSearch(

      searchKeyword,

      placesSearchCallback,

      {
        location:center
      }

    );

  }

  // 검색 결과 처리
  function placesSearchCallback(
    data,
    status
  ){

    if(
      status !==
      kakao.maps.services.Status.OK
    ){

      alert("검색 결과가 없습니다.");
      return;

    }

    const resultList =
      document.getElementById(
        "resultList"
      );

    resultList.innerHTML = "";

    const bounds =
      new kakao.maps.LatLngBounds();

    data.forEach((place)=>{

      const position =
        new kakao.maps.LatLng(
          place.y,
          place.x
        );

      bounds.extend(position);

      // 파란색 마커
      const markerImage =
        new kakao.maps.MarkerImage(

          "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png",

          new kakao.maps.Size(24,35)

        );

      const marker =
        new kakao.maps.Marker({

          map:map,
          position:position,
          image:markerImage

        });

      blueMarkers.push(marker);

      // 거리 계산
      const distance =
        getDistance(

          currentLatitude,
          currentLongitude,

          place.y,
          place.x

        );

      // 이동 시간 계산
      const estimatedMinutes =
        Math.max(
          1,
          Math.round(distance / 70)
        );

      // 결과 생성
      const item =
        document.createElement("div");

      item.className =
        "result-item";

      item.innerHTML = `

        <div class="flower-type">

          ${
            selectedFlowerType === "전체"

            ? "근처 꽃집"

            : `${selectedFlowerType} 꽃집`
          }

        </div>

        <div class="place-name">
          ${place.place_name}
        </div>

        <div class="place-info">
          주소:
          ${
            place.road_address_name
            || place.address_name
          }
        </div>

        <div class="place-info">
          좌표:
          ${Number(place.y).toFixed(5)},
          ${Number(place.x).toFixed(5)}
        </div>

        <div class="place-time">
          예상 이동 시간:
          약 ${estimatedMinutes}분
        </div>

      `;

      // 리스트 클릭
      item.addEventListener(

        "click",

        ()=>{

          map.setCenter(position);

          const infoWindow =
            new kakao.maps.InfoWindow({

              content:`
                <div style="
                  padding:8px;
                  font-size:13px;
                ">
                  ${place.place_name}
                </div>
              `

            });

          infoWindow.open(
            map,
            marker
          );

        }

      );

      resultList.appendChild(item);

    });

    map.setBounds(bounds);

  }

  // 기존 마커 제거
  function removeBlueMarkers(){

    blueMarkers.forEach((marker)=>{

      marker.setMap(null);

    });

    blueMarkers = [];

  }

  // 거리 계산 함수
  function getDistance(
    lat1,
    lng1,
    lat2,
    lng2
  ){

    const earthRadius = 6371000;

    const dLat =
      (lat2 - lat1)
      * Math.PI / 180;

    const dLng =
      (lng2 - lng1)
      * Math.PI / 180;

    const a =

      Math.sin(dLat/2)
      * Math.sin(dLat/2)

      +

      Math.cos(lat1 * Math.PI/180)
      * Math.cos(lat2 * Math.PI/180)

      *

      Math.sin(dLng/2)
      * Math.sin(dLng/2);

    const c =
      2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
      );

    return earthRadius * c;

  }

  // 카카오맵 로드 후 실행
  kakao.maps.load(()=>{

    if(navigator.geolocation){

      navigator.geolocation.getCurrentPosition(

        (position)=>{

          currentLatitude =
            position.coords.latitude;

          currentLongitude =
            position.coords.longitude;

          initMap(
            currentLatitude,
            currentLongitude
          );

        },

        ()=>{

          alert(
            "위치 권한이 거부되어 기본 위치로 이동합니다."
          );

          initMap(
            currentLatitude,
            currentLongitude
          );

        }

      );

    }else{

      initMap(
        currentLatitude,
        currentLongitude
      );

    }

  });

</script>

</body>
</html>
