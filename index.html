<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>카카오맵 대중교통 장소 안내</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 패널 */
    .sidebar {
      width: 35%;
      min-width: 330px;
      border-right: 1px solid #ddd;
      background: white;
      display: flex;
      flex-direction: column;
    }

    .search-box {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }

    .search-box h2 {
      margin-bottom: 15px;
      font-size: 22px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .search-row input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .search-row button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #ffcd00;
      cursor: pointer;
      font-weight: bold;
    }

    .search-row button:hover {
      background: #f3c400;
    }

    /* 결과 리스트 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .result-item {
      border-bottom: 1px solid #eee;
      padding: 15px 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .result-item:hover {
      background: #f7f7f7;
    }

    .place-name {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .place-info {
      font-size: 14px;
      color: #555;
      margin-bottom: 4px;
    }

    .place-time {
      font-size: 14px;
      color: #0066cc;
      font-weight: bold;
    }

    /* 지도 영역 */
    .map-area {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .loading {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 왼쪽 -->
  <div class="sidebar">

    <div class="search-box">
      <h2>대중교통 장소 검색</h2>

      <div class="search-row">
        <input type="text" id="keyword" placeholder="예: 카페, 도서관, 음식점">
        <button onclick="searchPlace()">검색</button>
      </div>

      <div class="search-row">
        <button onclick="moveToCurrentLocation()">
          현재 위치로 이동
        </button>
      </div>
    </div>

    <!-- 검색 결과 -->
    <div class="result-list" id="resultList"></div>

  </div>

  <!-- 오른쪽 지도 -->
  <div class="map-area">

    <div class="loading" id="loadingText">
      지도를 불러오는 중...
    </div>

    <div id="map"></div>

  </div>

</div>

<!-- 카카오맵 API -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a86be88376cf10f86584887bf9cacbe1&libraries=services&autoload=false"></script>

<script>

  let map;
  let placesService;

  // 현재 위치
  let currentLatitude = 37.5665;
  let currentLongitude = 126.9780;

  // 검색 마커 저장 배열
  let blueMarkers = [];

  // 현재 위치 마커
  let currentMarker;

  // 지도 초기화
  function initMap(latitude, longitude) {

    const container = document.getElementById("map");

    const options = {
      center: new kakao.maps.LatLng(latitude, longitude),
      level: 5
    };

    map = new kakao.maps.Map(container, options);

    placesService = new kakao.maps.services.Places();

    // 교통 정보 표시
    map.addOverlayMapTypeId(kakao.maps.MapTypeId.TRAFFIC);

    // 현재 위치 마커 표시
    showCurrentLocation(latitude, longitude);

    document.getElementById("loadingText").style.display = "none";
  }

  // 현재 위치 마커 표시
  function showCurrentLocation(latitude, longitude) {

    currentLatitude = latitude;
    currentLongitude = longitude;

    const position = new kakao.maps.LatLng(latitude, longitude);

    // 기존 현재 위치 마커 제거
    if (currentMarker) {
      currentMarker.setMap(null);
    }

    currentMarker = new kakao.maps.Marker({
      position: position,
      map: map
    });

    const infoWindow = new kakao.maps.InfoWindow({
      content: `
        <div style="padding:8px;font-size:13px;">
          현재 위치
        </div>
      `
    });

    infoWindow.open(map, currentMarker);

    map.setCenter(position);
  }

  // 현재 위치 가져오기
  function moveToCurrentLocation() {

    if (navigator.geolocation) {

      navigator.geolocation.getCurrentPosition(

        (position) => {

          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          showCurrentLocation(latitude, longitude);
        },

        () => {
          alert("위치 권한이 거부되었습니다.");
        }

      );

    } else {
      alert("위치 서비스를 지원하지 않습니다.");
    }
  }

  // 장소 검색
  function searchPlace() {

    const keyword = document.getElementById("keyword").value.trim();

    if (!keyword) {
      alert("검색어를 입력해주세요.");
      return;
    }

    // 기존 파란색 마커 제거
    removeBlueMarkers();

    // 현재 지도 중심 기준 검색
    const center = map.getCenter();

    placesService.keywordSearch(
      keyword,
      placesSearchCallback,
      {
        location: center
      }
    );
  }

  // 검색 결과 처리
  function placesSearchCallback(data, status) {

    if (status !== kakao.maps.services.Status.OK) {
      alert("검색 결과가 없습니다.");
      return;
    }

    const resultList = document.getElementById("resultList");
    resultList.innerHTML = "";

    const bounds = new kakao.maps.LatLngBounds();

    data.forEach((place) => {

      const position = new kakao.maps.LatLng(place.y, place.x);

      bounds.extend(position);

      // 파란색 마커 이미지
      const blueMarkerImage = new kakao.maps.MarkerImage(
        "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_blue.png",
        new kakao.maps.Size(24, 35)
      );

      // 파란색 마커 생성
      const marker = new kakao.maps.Marker({
        map: map,
        position: position,
        image: blueMarkerImage
      });

      blueMarkers.push(marker);

      // 현재 위치와 거리 계산
      const distance = getDistance(
        currentLatitude,
        currentLongitude,
        place.y,
        place.x
      );

      // 대략적 이동 시간 계산
      const estimatedMinutes = Math.max(1, Math.round(distance / 70));

      // 결과 아이템 생성
      const item = document.createElement("div");
      item.className = "result-item";

      item.innerHTML = `
        <div class="place-name">${place.place_name}</div>

        <div class="place-info">
          좌표: ${Number(place.y).toFixed(5)},
          ${Number(place.x).toFixed(5)}
        </div>

        <div class="place-info">
          주소: ${place.road_address_name || place.address_name}
        </div>

        <div class="place-time">
          대략 이동 시간: 약 ${estimatedMinutes}분
        </div>
      `;

      // 리스트 클릭 시 이동
      item.addEventListener("click", () => {

        map.setCenter(position);

        const infoWindow = new kakao.maps.InfoWindow({
          content: `
            <div style="padding:8px;font-size:13px;">
              ${place.place_name}
            </div>
          `
        });

        infoWindow.open(map, marker);
      });

      resultList.appendChild(item);

    });

    map.setBounds(bounds);
  }

  // 기존 파란색 마커 제거
  function removeBlueMarkers() {

    blueMarkers.forEach((marker) => {
      marker.setMap(null);
    });

    blueMarkers = [];
  }

  // 거리 계산 함수 (m 단위)
  function getDistance(lat1, lng1, lat2, lng2) {

    const earthRadius = 6371000;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) *
      Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLng / 2) *
      Math.sin(dLng / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return earthRadius * c;
  }

  // SDK 로드 완료 후 실행
  kakao.maps.load(() => {

    // 위치 권한 요청
    if (navigator.geolocation) {

      navigator.geolocation.getCurrentPosition(

        (position) => {

          currentLatitude = position.coords.latitude;
          currentLongitude = position.coords.longitude;

          initMap(currentLatitude, currentLongitude);
        },

        () => {

          alert("위치 권한이 거부되어 기본 위치로 이동합니다.");

          initMap(currentLatitude, currentLongitude);
        }

      );

    } else {

      initMap(currentLatitude, currentLongitude);
    }

  });

</script>

</body>
</html>
